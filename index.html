<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADS-B Live</title>
<script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#09090f}
#map{position:absolute;inset:0}
#hdr{position:fixed;top:0;left:0;right:0;z-index:9999;display:flex;align-items:center;gap:7px;padding:7px 14px;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.06);font-family:'Courier New',monospace;font-size:10px}
.dot{width:6px;height:6px;border-radius:50%;background:#0c0;animation:blink 1.5s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.08}}
#logo{font-size:12px;letter-spacing:4px;color:#fff;font-weight:bold}
#st{color:#3a7;font-size:9px;white-space:nowrap;min-width:180px}
#ct{color:#444;margin-left:auto;font-size:9px;white-space:nowrap}
.btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#777;padding:3px 9px;border-radius:3px;cursor:pointer;font-size:9px;font-family:inherit;white-space:nowrap;transition:all .1s}
.btn:hover{color:#fff;border-color:rgba(255,255,255,.3)}
.btn.on{background:rgba(60,140,255,.15);border-color:rgba(60,140,255,.4);color:#4af}
#sq{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#ccc;padding:3px 8px;border-radius:3px;font-family:inherit;font-size:9px;width:120px}
#sq::placeholder{color:#333}#sq:focus{outline:none;border-color:#4af}
#dbg{position:fixed;top:36px;left:0;right:0;z-index:9998;background:rgba(0,0,0,.92);font-family:'Courier New',monospace;font-size:9px;color:#0f0;padding:4px 14px;max-height:90px;overflow-y:auto;display:none}
#dbg.show{display:block}
#panel{position:fixed;top:0;right:0;bottom:0;width:265px;z-index:9998;background:rgba(4,4,12,.98);border-left:1px solid rgba(255,255,255,.06);transform:translateX(100%);transition:transform .2s;overflow-y:auto;padding:13px;font-family:'Courier New',monospace}
#panel.open{transform:translateX(0)}
#ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
#pc{font-size:18px;font-weight:bold;letter-spacing:3px}
#pt{font-size:8px;color:#333;margin-top:3px;line-height:1.5}
#xb{background:none;border:1px solid rgba(255,255,255,.08);color:#444;cursor:pointer;border-radius:2px;padding:2px 7px;font-size:11px}#xb:hover{color:#fff}
.row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:9px}
.rl{color:#333}.rv{color:#bbb;font-weight:bold;text-align:right;max-width:150px;word-break:break-all}
.rv.hi{color:#4af}.rv.w{color:#f80}.rv.e{color:#f44}
#fa{display:block;margin-top:10px;text-align:center;padding:5px;background:rgba(60,140,255,.07);border:1px solid rgba(60,140,255,.14);border-radius:3px;color:#4af;text-decoration:none;font-size:9px}
#leg{position:fixed;bottom:16px;left:14px;z-index:999;pointer-events:none;background:rgba(4,4,12,.88);border:1px solid rgba(255,255,255,.05);border-radius:4px;padding:7px 10px;font-family:'Courier New',monospace;font-size:8px;color:#333}
#leg h4{color:#222;margin-bottom:5px;letter-spacing:1px}
.lr{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.lc{width:20px;height:1.5px;border-radius:1px}
#sb{position:fixed;bottom:16px;right:14px;z-index:999;pointer-events:none;background:rgba(4,4,12,.88);border:1px solid rgba(255,255,255,.05);border-radius:4px;padding:7px 10px;font-family:'Courier New',monospace;font-size:8px;color:#333}
#sb div{margin-bottom:2px}#sb span{color:#555;font-weight:bold}
#bar{position:fixed;bottom:0;left:0;right:0;height:1px;z-index:9999}
#prg{height:100%;width:0%;background:linear-gradient(90deg,#c33,#c70,#990,#090,#28a);transition:width linear}
.maplibregl-ctrl-logo,.maplibregl-ctrl-attrib{display:none!important}
.maplibregl-ctrl-group{background:rgba(4,4,12,.92)!important;border:1px solid rgba(255,255,255,.08)!important}
.maplibregl-ctrl-group button{background:transparent!important}
.maplibregl-ctrl-icon{filter:invert(.5)}
</style>
</head>
<body>
<div id="map"></div>
<div id="hdr">
  <div class="dot"></div>
  <span id="logo">✈ LIVE</span>
  <span id="st">loading…</span>
  <input id="sq" type="text" placeholder="callsign / hex…" autocomplete="off" onkeydown="if(event.key==='Enter')doSearch()"/>
  <button class="btn on" onclick="doSearch()">GO</button>
  <button class="btn on" data-f="all">ALL</button>
  <button class="btn" data-f="mil">MIL</button>
  <button class="btn" data-f="hi">HIGH</button>
  <button class="btn" onclick="toggleDbg()">DBG</button>
  <button class="btn on" onclick="fetchAircraft()">↺</button>
  <span id="ct">—</span>
</div>
<div id="dbg"></div>
<div id="panel">
  <div id="ph"><div><div id="pc">———</div><div id="pt"></div></div><button id="xb">✕</button></div>
  <div id="pb"></div><a id="fa" href="#" target="_blank">→ FlightAware</a>
</div>
<div id="leg">
  <h4>ALTITUDE</h4>
  <div class="lr"><div class="lc" style="background:#be3232"></div>&lt;5k ft</div>
  <div class="lr"><div class="lc" style="background:#be6900"></div>5–15k</div>
  <div class="lr"><div class="lc" style="background:#909000"></div>15–25k</div>
  <div class="lr"><div class="lc" style="background:#008200"></div>25–35k</div>
  <div class="lr"><div class="lc" style="background:#1e78af"></div>&gt;35k ft</div>
</div>
<div id="sb">
  <div>airborne <span id="sa">—</span></div>
  <div>ground   <span id="sg">—</span></div>
  <div>military <span id="sm">—</span></div>
  <div>max alt  <span id="st2">—</span></div>
</div>
<div id="bar"><div id="prg"></div></div>

<script>
const dbgEl=document.getElementById('dbg');
function log(m,c){const d=document.createElement('div');d.style.color=c||'#0f0';d.textContent=`[${new Date().toLocaleTimeString()}] ${m}`;dbgEl.appendChild(d);dbgEl.scrollTop=dbgEl.scrollHeight;}
function toggleDbg(){dbgEl.classList.toggle('show');}

// ── MAP: inline style — only raster tiles + our data layers, nothing on top ──
const mlmap = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
    sources: {
      // Carto dark matter — proven CORS-open tiles
      carto: {
        type: 'raster',
        tiles: [
          'https://a.basemaps.cartocdn.com/dark_matter/{z}/{x}/{y}@2x.png',
          'https://b.basemaps.cartocdn.com/dark_matter/{z}/{x}/{y}@2x.png',
          'https://c.basemaps.cartocdn.com/dark_matter/{z}/{x}/{y}@2x.png',
        ],
        tileSize: 256,
        maxzoom: 18,
      },
      // Our aircraft data — start empty
      ac:    {type:'geojson', data:{type:'FeatureCollection',features:[]}},
      ticks: {type:'geojson', data:{type:'FeatureCollection',features:[]}},
      tr:    {type:'geojson', data:{type:'FeatureCollection',features:[]}},
    },
    layers: [
      // 1. Black background
      {id:'bg', type:'background', paint:{'background-color':'#09090f'}},
      // 2. Dark map tiles
      {id:'carto', type:'raster', source:'carto'},
      // 3. Trail lines — below aircraft
      {id:'trails', type:'line', source:'tr',
        paint:{'line-color':['get','color'],'line-opacity':['get','op'],'line-width':['get','w']},
        layout:{'line-cap':'round','line-join':'round'}},
      // 4. Heading ticks
      {id:'ticks', type:'line', source:'ticks',
        paint:{'line-color':['get','color'],'line-width':1.5,'line-opacity':0.85},
        layout:{'line-cap':'round'}},
      // 5. Glow halo (blurred, behind dot)
      {id:'ac-glow', type:'circle', source:'ac',
        filter:['==',['get','ground'],0],
        paint:{
          'circle-radius':['interpolate',['linear'],['zoom'],3,10,6,16,10,22],
          'circle-color':['get','color'],
          'circle-opacity':0.25,
          'circle-blur':0.8,
        }},
      // 6. Main dot — ON TOP of everything including map labels
      {id:'ac-dot', type:'circle', source:'ac',
        paint:{
          'circle-radius':['interpolate',['linear'],['zoom'],3,3,6,5,10,7,14,10],
          'circle-color':['get','color'],
          'circle-opacity':1,
          'circle-stroke-width':1.5,
          'circle-stroke-color':'#ffffff',
          'circle-stroke-opacity':0.5,
        }},
    ],
  },
  center: [-95, 37],
  zoom: 4,
  pitch: 62,
  bearing: -18,
  antialias: true,
  attributionControl: false,
});

mlmap.addControl(new maplibregl.NavigationControl({visualizePitch:true}),'bottom-right');
mlmap.on('error',e=>log('MapErr: '+(e.error?.message||e.sourceId||'?'),'#f80'));

mlmap.on('click','ac-dot',e=>{if(e.features[0])openPanel(e.features[0].properties.hex)});
mlmap.on('mouseenter','ac-dot',()=>mlmap.getCanvas().style.cursor='pointer');
mlmap.on('mouseleave','ac-dot',()=>mlmap.getCanvas().style.cursor='');

// ── STATE ────────────────────────────────────────────────────
const REFRESH=10000;
let aircraft=[],selHex=null,filt='all',timer=null,ready=false;
const trails={},MAX_TRAIL=60;

const onGround=a=>a.on_ground===true||a.alt_baro==='ground';
const isMil=a=>!!(a.military||a.mil||((a.dbFlags??0)&1));
const getAlt=a=>typeof a.alt_baro==='number'?a.alt_baro:typeof a.alt_geom==='number'?a.alt_geom:null;

function altRgb(alt){
  if(alt==null)return[80,80,80];
  const s=[[0,[190,50,50]],[5000,[190,105,0]],[15000,[144,144,0]],[25000,[0,130,60]],[35000,[30,120,175]],[50000,[80,155,195]]];
  for(let i=1;i<s.length;i++){
    if(alt<=s[i][0]){const t=(alt-s[i-1][0])/(s[i][0]-s[i-1][0]);return s[i-1][1].map((v,j)=>Math.round(v+t*(s[i][1][j]-v)));}
  }
  return[80,155,195];
}
const hexC=alt=>{const[r,g,b]=altRgb(alt);return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')};
const rgbC=alt=>{const[r,g,b]=altRgb(alt);return`rgb(${r},${g},${b})`};
const getVis=()=>filt==='mil'?aircraft.filter(isMil):filt==='hi'?aircraft.filter(a=>!onGround(a)&&(getAlt(a)??0)>25000):aircraft;

function updateTrails(){
  const seen=new Set(aircraft.map(a=>a.hex));
  for(const h of Object.keys(trails))if(!seen.has(h))delete trails[h];
  for(const a of aircraft){
    if(!trails[a.hex])trails[a.hex]=[];
    const t=trails[a.hex],last=t[t.length-1];
    if(!last||Math.hypot(a.lat-last.lat,a.lon-last.lng)>0.001){
      t.push({lng:a.lon,lat:a.lat,alt:getAlt(a)});
      if(t.length>MAX_TRAIL)t.shift();
    }
  }
}

function buildGeo(){
  const vis=getVis();
  const acF=vis.map(a=>({type:'Feature',
    geometry:{type:'Point',coordinates:[a.lon,a.lat]},
    properties:{hex:a.hex,color:hexC(getAlt(a)),rotation:a.track??0,
      alt:getAlt(a)??0,ground:onGround(a)?1:0}
  }));
  const tickF=[];
  for(const a of vis){
    if(onGround(a)||!a.track)continue;
    const rad=a.track*Math.PI/180,len=0.08;
    tickF.push({type:'Feature',
      geometry:{type:'LineString',coordinates:[[a.lon,a.lat],[a.lon+Math.sin(rad)*len,a.lat+Math.cos(rad)*len]]},
      properties:{color:hexC(getAlt(a))}
    });
  }
  const trF=[];
  for(const a of vis){
    const t=trails[a.hex]||[];
    // Draw full trail as one multi-segment line per aircraft for continuity
    if(t.length>=2){
      for(let i=1;i<t.length;i++){
        const p=i/t.length;
        trF.push({type:'Feature',
          geometry:{type:'LineString',coordinates:[[t[i-1].lng,t[i-1].lat],[t[i].lng,t[i].lat]]},
          properties:{color:hexC(t[i].alt),op:p*(selHex===a.hex?0.85:0.55),w:p*(selHex===a.hex?2.5:1.6)}
        });
      }
    }
  }
  return{acF,tickF,trF};
}

function render(){
  const{acF,tickF,trF}=buildGeo();
  mlmap.getSource('ac')?.setData({type:'FeatureCollection',features:acF});
  mlmap.getSource('ticks')?.setData({type:'FeatureCollection',features:tickF});
  mlmap.getSource('tr')?.setData({type:'FeatureCollection',features:trF});
}

// ── MAP READY ────────────────────────────────────────────────
mlmap.on('load',()=>{
  ready=true;
  log('Map loaded ✓ — fetching…');
  document.getElementById('st').textContent='map ready';
  fetchAircraft();
  startBar();
  timer=setInterval(()=>{fetchAircraft();startBar();},REFRESH);
});

// ── FETCH ────────────────────────────────────────────────────
async function fetchAircraft(){
  const c=mlmap.getCenter();
  const lat=c.lat.toFixed(3),lon=c.lng.toFixed(3);
  const zoom=mlmap.getZoom();
  const nm=zoom<5?250:zoom<7?200:zoom<9?120:60;
  log(`Fetching ${lat},${lon} r=${nm}nm`,'#888');
  const attempts=[
    [`https://api.airplanes.live/v2/point/${lat}/${lon}/${nm}`,'airplanes.live'],
    [`https://api.adsb.one/v2/point/${lat}/${lon}/${nm}`,'adsb.one'],
    [`https://opendata.adsb.fi/api/v3/lat/${lat}/lon/${lon}/dist/${nm}`,'adsb.fi'],
    [`https://api.adsb.lol/v2/point/${lat}/${lon}/${nm}`,'adsb.lol'],
    [`https://corsproxy.io/?url=${encodeURIComponent(`https://api.airplanes.live/v2/point/${lat}/${lon}/${nm}`)}`,'corsproxy'],
    [`https://api.allorigins.win/raw?url=${encodeURIComponent(`https://api.airplanes.live/v2/point/${lat}/${lon}/${nm}`)}`,'allorigins'],
  ];
  for(const[url,label]of attempts){
    try{
      const r=await fetch(url,{mode:'cors',cache:'no-store',signal:AbortSignal.timeout(9000)});
      if(!r.ok){log(`${label}: HTTP ${r.status}`,'#f80');continue;}
      const d=await r.json();
      const list=d.aircraft??d.ac??d.planes??d.data??[];
      if(!Array.isArray(list)||list.length===0){log(`${label}: ${list.length??'bad'} results`,'#f80');continue;}
      aircraft=list.filter(a=>a.lat!=null&&a.lon!=null);
      // Seed trails from initial positions so lines appear immediately
      for(const a of aircraft){
        if(!trails[a.hex]) trails[a.hex]=[];
        const t=trails[a.hex];
        if(t.length===0) t.push({lng:a.lon,lat:a.lat,alt:getAlt(a)});
      }
      updateTrails();render();
      document.getElementById('sa').textContent=aircraft.filter(a=>!onGround(a)).length.toLocaleString();
      document.getElementById('sg').textContent=aircraft.filter(onGround).length.toLocaleString();
      document.getElementById('sm').textContent=aircraft.filter(isMil).length.toLocaleString();
      const alts=aircraft.map(getAlt).filter(Boolean);
      document.getElementById('st2').textContent=alts.length?Math.max(...alts).toLocaleString()+' ft':'—';
      document.getElementById('st').textContent=`${new Date().toLocaleTimeString()} · ${label}`;
      document.getElementById('ct').textContent=`${aircraft.length.toLocaleString()} aircraft`;
      log(`✓ ${label} — ${aircraft.length} aircraft`,'#0f0');
      return;
    }catch(e){log(`${label}: ${e.message}`,'#f80');}
  }
  log('All APIs failed','#f44');
  document.getElementById('st').textContent='⚠ all APIs failed';
}

// ── PANEL ────────────────────────────────────────────────────
function openPanel(hex,pan=true){
  const a=aircraft.find(x=>x.hex===hex);if(!a)return;
  selHex=hex;
  const cs=(a.flight??a.callsign??'').trim()||a.hex?.toUpperCase()||'—';
  const alt=onGround(a)?'On ground':getAlt(a)!=null?getAlt(a).toLocaleString()+' ft':'—';
  const fl=!onGround(a)&&getAlt(a)?` FL${Math.round(getAlt(a)/100).toString().padStart(3,'0')}`:'';
  const vr=a.baro_rate!=null?`${a.baro_rate>0?'▲':a.baro_rate<0?'▼':'→'} ${Math.abs(a.baro_rate).toLocaleString()} fpm`:null;
  document.getElementById('pc').textContent=cs;
  document.getElementById('pc').style.color=rgbC(getAlt(a));
  document.getElementById('pt').textContent=[a.desc,a.t,a.r].filter(Boolean).join(' · ')||'Unknown';
  const rows=[
    ['ICAO',a.hex?.toUpperCase(),''],['Callsign',(a.flight??a.callsign??'').trim()||null,''],
    ['Reg.',a.r,''],['Type',a.t,''],['Aircraft',a.desc,''],['Operator',a.ownOp??a.operator,''],
    ['Altitude',alt+fl,'hi'],['Speed',a.gs!=null?Math.round(a.gs)+' kts':null,''],
    ['Mach',a.mach!=null?a.mach.toFixed(2):null,''],['Heading',a.track!=null?Math.round(a.track)+'°':null,''],
    ['Vert.Rate',vr,a.baro_rate<-100?'w':''],
    ['Squawk',a.squawk,['7500','7600','7700'].includes(a.squawk)?'e':''],
    ['Emergency',a.emergency&&a.emergency!=='none'?'⚠ '+a.emergency.toUpperCase():null,'e'],
    ['Military',isMil(a)?'⚠ YES':null,'w'],
    ['Position',a.lat!=null?`${a.lat.toFixed(4)}°, ${a.lon.toFixed(4)}°`:null,''],
  ].filter(([,v])=>v!=null&&v!=='');
  document.getElementById('pb').innerHTML=rows.map(([l,v,c])=>
    `<div class="row"><span class="rl">${l}</span><span class="rv ${c}">${v}</span></div>`).join('');
  document.getElementById('fa').href=cs!==a.hex?.toUpperCase()
    ?`https://flightaware.com/live/flight/${cs}`:`https://flightaware.com/live/modes/${a.hex}/redirect`;
  document.getElementById('panel').classList.add('open');
  if(pan&&a.lat&&a.lon)mlmap.flyTo({center:[a.lon,a.lat],duration:600});
  render();
}
document.getElementById('xb').onclick=()=>{selHex=null;document.getElementById('panel').classList.remove('open');render()};

function doSearch(){
  const q=document.getElementById('sq').value.trim().toLowerCase();if(!q)return;
  const f=aircraft.find(a=>a.flight?.trim().toLowerCase()===q||a.callsign?.trim().toLowerCase()===q||a.hex?.toLowerCase()===q||a.r?.toLowerCase()===q);
  if(f){mlmap.flyTo({center:[f.lon,f.lat],zoom:9,duration:800});openPanel(f.hex,false);}
  else document.getElementById('st').textContent=`"${q}" not found`;
}
document.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('[data-f]').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');filt=b.dataset.f;render();
});

function startBar(){
  const p=document.getElementById('prg');
  p.style.transition='none';p.style.width='0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{p.style.transition=`width ${REFRESH}ms linear`;p.style.width='100%'}));
}

mlmap.on('moveend',()=>{
  if(!ready)return;
  clearInterval(timer);fetchAircraft();startBar();
  timer=setInterval(()=>{fetchAircraft();startBar();},REFRESH);
});
</script>
</body>
</html>
