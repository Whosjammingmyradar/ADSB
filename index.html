<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADS-B Live</title>
<script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#09090f}
#map{position:absolute;inset:0}
#hdr{position:fixed;top:0;left:0;right:0;z-index:9999;display:flex;align-items:center;gap:7px;padding:7px 14px;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.06);font-family:'Courier New',monospace;font-size:10px}
.dot{width:6px;height:6px;border-radius:50%;background:#0c0;animation:blink 1.5s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.08}}
#logo{font-size:12px;letter-spacing:4px;color:#fff;font-weight:bold}
#st{color:#3a7;font-size:9px;white-space:nowrap;min-width:180px}
#ct{color:#444;margin-left:auto;font-size:9px;white-space:nowrap}
.btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#777;padding:3px 9px;border-radius:3px;cursor:pointer;font-size:9px;font-family:inherit;white-space:nowrap;transition:all .1s}
.btn:hover{color:#fff;border-color:rgba(255,255,255,.3)}
.btn.on{background:rgba(60,140,255,.15);border-color:rgba(60,140,255,.4);color:#4af}
#sq{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#ccc;padding:3px 8px;border-radius:3px;font-family:inherit;font-size:9px;width:120px}
#sq::placeholder{color:#333}#sq:focus{outline:none;border-color:#4af}
#panel{position:fixed;top:0;right:0;bottom:0;width:265px;z-index:9998;background:rgba(4,4,12,.98);border-left:1px solid rgba(255,255,255,.06);transform:translateX(100%);transition:transform .2s;overflow-y:auto;padding:13px;font-family:'Courier New',monospace}
#panel.open{transform:translateX(0)}
#ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
#pc{font-size:18px;font-weight:bold;letter-spacing:3px}
#pt{font-size:8px;color:#333;margin-top:3px;line-height:1.5}
#xb{background:none;border:1px solid rgba(255,255,255,.08);color:#444;cursor:pointer;border-radius:2px;padding:2px 7px;font-size:11px}#xb:hover{color:#fff}
.row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:9px}
.rl{color:#333}.rv{color:#bbb;font-weight:bold;text-align:right;max-width:150px;word-break:break-all}
.rv.hi{color:#4af}.rv.w{color:#f80}.rv.e{color:#f44}
#fa{display:block;margin-top:10px;text-align:center;padding:5px;background:rgba(60,140,255,.07);border:1px solid rgba(60,140,255,.14);border-radius:3px;color:#4af;text-decoration:none;font-size:9px}
#leg{position:fixed;bottom:16px;left:14px;z-index:999;pointer-events:none;background:rgba(4,4,12,.88);border:1px solid rgba(255,255,255,.05);border-radius:4px;padding:7px 10px;font-family:'Courier New',monospace;font-size:8px;color:#333}
#leg h4{color:#222;margin-bottom:5px;letter-spacing:1px}
.lr{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.lc{width:20px;height:1.5px;border-radius:1px}
#sb{position:fixed;bottom:16px;right:14px;z-index:999;pointer-events:none;background:rgba(4,4,12,.88);border:1px solid rgba(255,255,255,.05);border-radius:4px;padding:7px 10px;font-family:'Courier New',monospace;font-size:8px;color:#333}
#sb div{margin-bottom:2px}#sb span{color:#555;font-weight:bold}
#bar{position:fixed;bottom:0;left:0;right:0;height:1px;z-index:9999}
#prg{height:100%;width:0%;background:linear-gradient(90deg,#c33,#c70,#990,#090,#28a);transition:width linear}
.maplibregl-ctrl-logo,.maplibregl-ctrl-attrib{display:none!important}
.maplibregl-ctrl-group{background:rgba(4,4,12,.92)!important;border:1px solid rgba(255,255,255,.08)!important}
.maplibregl-ctrl-group button{background:transparent!important}
.maplibregl-ctrl-icon{filter:invert(.5)}

/* ── 3D ORBIT OVERLAY ─────────────────────────────────────── */
#orbit-overlay{
  display:none;
  position:fixed;inset:0;z-index:10000;
  background:rgba(0,0,0,.96);
  flex-direction:column;
}
#orbit-overlay.open{display:flex;}
#orbit-canvas-wrap{
  position:relative;flex:1;
}
#orbit-canvas{width:100%;height:100%;display:block;}
#orbit-hdr{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px;
  background:linear-gradient(180deg,rgba(0,0,0,.9),transparent);
  font-family:'Courier New',monospace;pointer-events:none;
  z-index:1;
}
#orbit-title{font-size:22px;letter-spacing:4px;font-weight:bold;color:#fff;}
#orbit-sub{font-size:9px;color:#444;margin-top:3px;}
#orbit-close{
  pointer-events:all;cursor:pointer;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  color:#888;padding:6px 14px;border-radius:3px;font-family:'Courier New',monospace;font-size:10px;
  transition:all .15s;
}
#orbit-close:hover{color:#fff;border-color:#fff;}
#orbit-hint{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  font-family:'Courier New',monospace;font-size:9px;color:#333;
  pointer-events:none;text-align:center;letter-spacing:1px;
}
#orbit-stats{
  position:absolute;bottom:20px;right:20px;
  font-family:'Courier New',monospace;font-size:9px;color:#333;
  line-height:1.8;pointer-events:none;text-align:right;
}
</style>
</head>
<body>
<div id="map"></div>
<div id="hdr">
  <div class="dot"></div>
  <span id="logo">✈ LIVE</span>
  <span id="st">loading…</span>
  <input id="sq" type="text" placeholder="callsign / hex…" autocomplete="off" onkeydown="if(event.key==='Enter')doSearch()"/>
  <button class="btn on" onclick="doSearch()">GO</button>
  <button class="btn on" data-f="all">ALL</button>
  <button class="btn" data-f="mil">MIL</button>
  <button class="btn" data-f="hi">HIGH</button>
  <button class="btn on" onclick="fetchAircraft()">↺</button>
  <span id="ct">—</span>
</div>
<div id="panel">
  <div id="ph"><div><div id="pc">———</div><div id="pt"></div></div><button id="xb">✕</button></div>
  <div id="pb"></div><a id="fa" href="#" target="_blank">→ FlightAware</a>
</div>
<div id="leg">
  <h4>ALTITUDE</h4>
  <div class="lr"><div class="lc" style="background:#be3232"></div>&lt;5k ft</div>
  <div class="lr"><div class="lc" style="background:#be6900"></div>5–15k</div>
  <div class="lr"><div class="lc" style="background:#909000"></div>15–25k</div>
  <div class="lr"><div class="lc" style="background:#008200"></div>25–35k</div>
  <div class="lr"><div class="lc" style="background:#1e78af"></div>&gt;35k ft</div>
</div>
<div id="sb">
  <div>airborne <span id="sa">—</span></div>
  <div>ground   <span id="sg">—</span></div>
  <div>military <span id="sm">—</span></div>
  <div>max alt  <span id="st2">—</span></div>
</div>
<div id="bar"><div id="prg"></div></div>

<!-- 3D ORBIT OVERLAY -->
<div id="orbit-overlay">
  <div id="orbit-canvas-wrap">
    <canvas id="orbit-canvas"></canvas>
    <div id="orbit-hdr">
      <div>
        <div id="orbit-title">——</div>
        <div id="orbit-sub"></div>
      </div>
      <button id="orbit-close" onclick="closeOrbit()">✕ CLOSE</button>
    </div>
    <div id="orbit-hint">LEFT DRAG · rotate &nbsp;|&nbsp; RIGHT DRAG · pan &nbsp;|&nbsp; SCROLL · zoom &nbsp;|&nbsp; DOUBLE-CLICK any aircraft to orbit</div>
    <div id="orbit-stats"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// MAP (MapLibre)
// ══════════════════════════════════════════════════════════════
const mlmap = new maplibregl.Map({
  container:'map',
  style:'https://tiles.openfreemap.org/styles/dark',
  center:[-95,37], zoom:4, pitch:62, bearing:-18,
  antialias:true, attributionControl:false,
});
mlmap.addControl(new maplibregl.NavigationControl({visualizePitch:true}),'bottom-right');
mlmap.setMaxPitch(85);

const REFRESH=10000;
let aircraft=[],selHex=null,filt='all',timer=null,ready=false;
const trails={};

const onGround=a=>a.on_ground===true||a.alt_baro==='ground';
const isMil=a=>!!(a.military||a.mil||((a.dbFlags??0)&1));
const getAlt=a=>typeof a.alt_baro==='number'?a.alt_baro:typeof a.alt_geom==='number'?a.alt_geom:null;

function altRgb(alt){
  if(alt==null)return[80,80,80];
  const s=[[0,[190,50,50]],[5000,[190,105,0]],[15000,[144,144,0]],[25000,[0,130,60]],[35000,[30,120,175]],[50000,[80,155,195]]];
  for(let i=1;i<s.length;i++){if(alt<=s[i][0]){const t=(alt-s[i-1][0])/(s[i][0]-s[i-1][0]);return s[i-1][1].map((v,j)=>Math.round(v+t*(s[i][1][j]-v)));}}
  return[80,155,195];
}
const hexC=alt=>{const[r,g,b]=altRgb(alt);return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')};
const rgbC=alt=>{const[r,g,b]=altRgb(alt);return`rgb(${r},${g},${b})`};
const getVis=()=>filt==='mil'?aircraft.filter(isMil):filt==='hi'?aircraft.filter(a=>!onGround(a)&&(getAlt(a)??0)>25000):aircraft;

function updateTrails(){
  const seen=new Set(aircraft.map(a=>a.hex));
  for(const h of Object.keys(trails))if(!seen.has(h))delete trails[h];
  for(const a of aircraft){
    if(!trails[a.hex])trails[a.hex]=[];
    const t=trails[a.hex],last=t[t.length-1];
    if(!last||last[0]!==a.lon||last[1]!==a.lat){
      t.push([a.lon,a.lat,getAlt(a)??0]);
      if(t.length>120)t.shift();
    }
  }
}

function buildGeo(){
  const vis=getVis();
  const acF=vis.map(a=>({type:'Feature',
    geometry:{type:'Point',coordinates:[a.lon,a.lat]},
    properties:{hex:a.hex,color:hexC(getAlt(a)),alt:getAlt(a)??0,ground:onGround(a)?1:0}
  }));
  const trF=[];
  for(const a of vis){
    const pts=trails[a.hex];
    if(!pts||pts.length<2)continue;
    for(let i=1;i<pts.length;i++){
      const p=i/(pts.length-1);
      const isSel=selHex===a.hex;
      trF.push({type:'Feature',
        geometry:{type:'LineString',coordinates:[[pts[i-1][0],pts[i-1][1]],[pts[i][0],pts[i][1]]]},
        properties:{color:hexC(pts[i][2]),op:Math.pow(p,0.6)*(isSel?0.95:0.65),w:0.8+p*(isSel?2.2:1.4)}
      });
    }
  }
  return{acF,trF};
}

function render(){
  if(!ready)return;
  const{acF,trF}=buildGeo();
  mlmap.getSource('ac')?.setData({type:'FeatureCollection',features:acF});
  mlmap.getSource('tr')?.setData({type:'FeatureCollection',features:trF});
}

mlmap.on('load',()=>{
  mlmap.addSource('tr',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  mlmap.addLayer({id:'trails',type:'line',source:'tr',
    paint:{'line-color':['get','color'],'line-opacity':['get','op'],'line-width':['get','w']},
    layout:{'line-cap':'round','line-join':'round'}});
  mlmap.addSource('ac',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  mlmap.addLayer({id:'ac-glow',type:'circle',source:'ac',filter:['==',['get','ground'],0],
    paint:{'circle-radius':['interpolate',['linear'],['zoom'],3,5,7,9,11,14],
      'circle-color':['get','color'],'circle-opacity':0.2,'circle-blur':0.8}});
  mlmap.addLayer({id:'ac-dot',type:'circle',source:'ac',
    paint:{'circle-radius':['interpolate',['linear'],['zoom'],3,1.5,5,2,8,3,11,4.5,14,6],
      'circle-color':['get','color'],'circle-opacity':1,
      'circle-stroke-width':1,'circle-stroke-color':'#fff','circle-stroke-opacity':0.4}});

  mlmap.on('click','ac-dot',e=>{if(e.features[0])openPanel(e.features[0].properties.hex);});
  // Double-click → open 3D orbit view
  mlmap.on('dblclick','ac-dot',e=>{
    e.preventDefault();
    if(e.features[0])openOrbit(e.features[0].properties.hex);
  });
  mlmap.on('mouseenter','ac-dot',()=>mlmap.getCanvas().style.cursor='pointer');
  mlmap.on('mouseleave','ac-dot',()=>mlmap.getCanvas().style.cursor='');
  ready=true;
  fetchAircraft();startBar();
  timer=setInterval(()=>{fetchAircraft();startBar();},REFRESH);
});

// ══════════════════════════════════════════════════════════════
// 3D ORBIT VIEW (Three.js)
// ══════════════════════════════════════════════════════════════
let orbitRenderer=null,orbitScene=null,orbitCamera=null,orbitAnim=null;
let orbitHex=null;
// Mouse orbit state
const orbitMouse={down:false,x:0,y:0,theta:0,phi:45,radius:8,tx:0,ty:0};

function openOrbit(hex){
  const a=aircraft.find(x=>x.hex===hex);if(!a)return;
  orbitHex=hex;

  const ov=document.getElementById('orbit-overlay');
  const canvas=document.getElementById('orbit-canvas');
  ov.classList.add('open');

  const cs=(a.flight??a.callsign??'').trim()||a.hex?.toUpperCase()||'—';
  const alt=getAlt(a);
  document.getElementById('orbit-title').textContent=cs;
  document.getElementById('orbit-title').style.color=hexC(alt);
  document.getElementById('orbit-sub').textContent=
    [a.desc,a.t,a.r].filter(Boolean).join(' · ')||'Unknown type';
  updateOrbitStats(a);

  // Tear down previous renderer if any
  if(orbitRenderer){orbitRenderer.dispose();orbitRenderer=null;}
  cancelAnimationFrame(orbitAnim);

  // Size canvas to container
  const wrap=document.getElementById('orbit-canvas-wrap');
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;

  // Scene
  orbitScene=new THREE.Scene();
  orbitScene.background=new THREE.Color(0x06060e);
  orbitScene.fog=new THREE.FogExp2(0x06060e,0.04);

  // Camera
  orbitCamera=new THREE.PerspectiveCamera(60,canvas.width/canvas.height,0.01,1000);

  // Renderer
  orbitRenderer=new THREE.WebGLRenderer({canvas,antialias:true});
  orbitRenderer.setPixelRatio(window.devicePixelRatio);
  orbitRenderer.setSize(canvas.width,canvas.height);

  // Lights
  orbitScene.add(new THREE.AmbientLight(0xffffff,0.4));
  const sun=new THREE.DirectionalLight(0xffffff,1.2);
  sun.position.set(10,20,10);
  orbitScene.add(sun);
  const fill=new THREE.DirectionalLight(0x4488ff,0.3);
  fill.position.set(-10,-5,-10);
  orbitScene.add(fill);

  // Ground plane (represents earth surface / clouds below)
  const groundGeo=new THREE.PlaneGeometry(60,60,30,30);
  const groundMat=new THREE.MeshStandardMaterial({
    color:0x0a1520,wireframe:false,roughness:1,
    transparent:true,opacity:0.6,
  });
  const ground=new THREE.Mesh(groundGeo,groundMat);
  ground.rotation.x=-Math.PI/2;
  ground.position.y=-2;
  orbitScene.add(ground);

  // Grid lines on ground
  const grid=new THREE.GridHelper(40,40,0x0d2535,0x0d2535);
  grid.position.y=-2;
  orbitScene.add(grid);

  // Atmosphere glow ring
  const ringGeo=new THREE.TorusGeometry(18,0.5,8,80);
  const ringMat=new THREE.MeshBasicMaterial({color:0x001a33,transparent:true,opacity:0.3});
  const ring=new THREE.Mesh(ringGeo,ringMat);
  ring.rotation.x=Math.PI/2;
  ring.position.y=-2;
  orbitScene.add(ring);

  // Stars
  const starGeo=new THREE.BufferGeometry();
  const starVerts=[];
  for(let i=0;i<2000;i++){
    const r=80+Math.random()*120;
    const theta=Math.random()*Math.PI*2;
    const phi=Math.acos(2*Math.random()-1);
    starVerts.push(r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
  }
  starGeo.setAttribute('position',new THREE.Float32BufferAttribute(starVerts,3));
  orbitScene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:0.15,transparent:true,opacity:0.6})));

  // ── Build aircraft model ───────────────────────────────────
  const acColor=new THREE.Color(hexC(alt));
  const acGroup=new THREE.Group();

  // Fuselage
  const fuseGeo=new THREE.CylinderGeometry(0.08,0.06,1.2,12);
  const fuseMat=new THREE.MeshStandardMaterial({color:0xccccdd,metalness:0.8,roughness:0.2});
  const fuse=new THREE.Mesh(fuseGeo,fuseMat);
  fuse.rotation.z=Math.PI/2;
  acGroup.add(fuse);

  // Nose cone
  const noseGeo=new THREE.ConeGeometry(0.08,0.3,12);
  const nose=new THREE.Mesh(noseGeo,fuseMat);
  nose.rotation.z=-Math.PI/2;
  nose.position.x=0.75;
  acGroup.add(nose);

  // Wings
  const wingShape=new THREE.Shape();
  wingShape.moveTo(0,0);wingShape.lineTo(-0.15,1.4);wingShape.lineTo(-0.3,1.4);
  wingShape.lineTo(-0.5,0.1);wingShape.lineTo(-0.1,-0.05);wingShape.closePath();
  const wingGeo=new THREE.ShapeGeometry(wingShape);
  const wingMat=new THREE.MeshStandardMaterial({color:0xaaaacc,metalness:0.6,roughness:0.3,side:THREE.DoubleSide});
  const wingL=new THREE.Mesh(wingGeo,wingMat);
  wingL.position.set(-0.1,0,0);
  wingL.rotation.x=Math.PI/2;
  acGroup.add(wingL);
  const wingR=wingL.clone();
  wingR.scale.z=-1;
  acGroup.add(wingR);

  // Tail fin
  const tailShape=new THREE.Shape();
  tailShape.moveTo(0,0);tailShape.lineTo(-0.05,0.5);tailShape.lineTo(-0.3,0.5);
  tailShape.lineTo(-0.35,0.05);tailShape.closePath();
  const tailGeo=new THREE.ShapeGeometry(tailShape);
  const tailV=new THREE.Mesh(tailGeo,wingMat);
  tailV.position.set(-0.55,0.04,0);
  tailV.rotation.y=Math.PI/2;
  acGroup.add(tailV);

  // Horizontal stabilizers
  const hstabGeo=new THREE.BoxGeometry(0.35,0.02,0.6);
  const hstab=new THREE.Mesh(hstabGeo,wingMat);
  hstab.position.set(-0.52,0.04,0);
  acGroup.add(hstab);

  // Engine glow
  const engineGeo=new THREE.SphereGeometry(0.12,8,8);
  const engineMat=new THREE.MeshBasicMaterial({color:acColor,transparent:true,opacity:0.7});
  [-0.1,0.1].forEach((zOff,i)=>{
    const eng=new THREE.Mesh(engineGeo,engineMat.clone());
    eng.position.set(-0.05,0,zOff*4);
    eng.scale.x=2;
    acGroup.add(eng);
  });

  // Altitude color stripe on fuselage
  const stripeGeo=new THREE.CylinderGeometry(0.085,0.065,1.22,12);
  const stripeMat=new THREE.MeshBasicMaterial({color:acColor,transparent:true,opacity:0.25,wireframe:false});
  const stripe=new THREE.Mesh(stripeGeo,stripeMat);
  stripe.rotation.z=Math.PI/2;
  acGroup.add(stripe);

  // Point aircraft in direction of travel
  if(a.track){acGroup.rotation.y=-(a.track)*Math.PI/180;}
  orbitScene.add(acGroup);

  // ── Flight path trail ─────────────────────────────────────
  const pts=trails[hex]||[];
  if(pts.length>=2){
    // Convert lat/lon trail to local XZ coords relative to aircraft
    const originLat=a.lat,originLon=a.lon;
    const DEG=111320; // meters per degree lat
    const trailPoints=pts.map(p=>{
      const dx=(p[0]-originLon)*DEG*Math.cos(originLat*Math.PI/180)/1000; // km → scene units
      const dz=-(p[1]-originLat)*DEG/1000;
      const dy=(p[2]-getAlt(a)??0)/30000; // altitude diff in scene units
      return new THREE.Vector3(dx*0.5,dy,dz*0.5);
    });
    const trailGeo=new THREE.BufferGeometry().setFromPoints(trailPoints);
    const trailMat=new THREE.LineBasicMaterial({color:acColor,transparent:true,opacity:0.6});
    orbitScene.add(new THREE.Line(trailGeo,trailMat));

    // Start point marker
    const startGeo=new THREE.SphereGeometry(0.08,8,8);
    const startMat=new THREE.MeshBasicMaterial({color:acColor,transparent:true,opacity:0.5});
    const startMesh=new THREE.Mesh(startGeo,startMat);
    startMesh.position.copy(trailPoints[0]);
    orbitScene.add(startMesh);

    // Vertical drop line from start to ground
    const dropGeo=new THREE.BufferGeometry().setFromPoints([
      trailPoints[0],new THREE.Vector3(trailPoints[0].x,-2,trailPoints[0].z)
    ]);
    orbitScene.add(new THREE.Line(dropGeo,new THREE.LineBasicMaterial({color:0x334455,transparent:true,opacity:0.4})));
  }

  // Drop line from aircraft to ground
  const dropGeo2=new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0),new THREE.Vector3(0,-2,0)
  ]);
  orbitScene.add(new THREE.Line(dropGeo2,new THREE.LineBasicMaterial({color:hexC(alt),transparent:true,opacity:0.35})));

  // Altitude label ring
  const ringSmGeo=new THREE.TorusGeometry(0.4,0.01,6,40);
  const ringSmMat=new THREE.MeshBasicMaterial({color:acColor,transparent:true,opacity:0.4});
  orbitScene.add(new THREE.Mesh(ringSmGeo,ringSmMat));

  // ── Set up mouse orbit ────────────────────────────────────
  orbitMouse.theta=-30; orbitMouse.phi=25; orbitMouse.radius=8;
  orbitMouse.tx=0; orbitMouse.ty=0;

  canvas.onmousedown=e=>{
    orbitMouse.down=true; orbitMouse.button=e.button;
    orbitMouse.x=e.clientX; orbitMouse.y=e.clientY;
  };
  canvas.onmouseup=()=>orbitMouse.down=false;
  canvas.onmouseleave=()=>orbitMouse.down=false;
  canvas.onmousemove=e=>{
    if(!orbitMouse.down)return;
    const dx=e.clientX-orbitMouse.x, dy=e.clientY-orbitMouse.y;
    orbitMouse.x=e.clientX; orbitMouse.y=e.clientY;
    if(orbitMouse.button===2){
      // Right drag = pan
      orbitMouse.tx-=dx*0.01; orbitMouse.ty+=dy*0.01;
    } else {
      // Left drag = orbit
      orbitMouse.theta-=dx*0.4;
      orbitMouse.phi=Math.max(-89,Math.min(89,orbitMouse.phi-dy*0.4));
    }
  };
  canvas.onwheel=e=>{
    orbitMouse.radius=Math.max(1.5,Math.min(40,orbitMouse.radius+e.deltaY*0.01));
    e.preventDefault();
  };
  canvas.oncontextmenu=e=>e.preventDefault();

  // Touch support
  let lastTouchDist=0;
  canvas.ontouchstart=e=>{
    if(e.touches.length===1){
      orbitMouse.down=true; orbitMouse.button=0;
      orbitMouse.x=e.touches[0].clientX; orbitMouse.y=e.touches[0].clientY;
    } else if(e.touches.length===2){
      lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    }
    e.preventDefault();
  },{passive:false});
  canvas.ontouchmove=e=>{
    if(e.touches.length===1&&orbitMouse.down){
      const dx=e.touches[0].clientX-orbitMouse.x, dy=e.touches[0].clientY-orbitMouse.y;
      orbitMouse.x=e.touches[0].clientX; orbitMouse.y=e.touches[0].clientY;
      orbitMouse.theta-=dx*0.4;
      orbitMouse.phi=Math.max(-89,Math.min(89,orbitMouse.phi-dy*0.4));
    } else if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      orbitMouse.radius=Math.max(1.5,Math.min(40,orbitMouse.radius-(d-lastTouchDist)*0.02));
      lastTouchDist=d;
    }
    e.preventDefault();
  },{passive:false});
  canvas.ontouchend=()=>orbitMouse.down=false;

  // ── Animate ───────────────────────────────────────────────
  function animate(){
    orbitAnim=requestAnimationFrame(animate);
    // Slowly auto-rotate when not interacting
    if(!orbitMouse.down) orbitMouse.theta+=0.08;

    const tRad=orbitMouse.theta*Math.PI/180;
    const pRad=orbitMouse.phi*Math.PI/180;
    orbitCamera.position.set(
      orbitMouse.radius*Math.cos(pRad)*Math.sin(tRad)+orbitMouse.tx,
      orbitMouse.radius*Math.sin(pRad)+orbitMouse.ty,
      orbitMouse.radius*Math.cos(pRad)*Math.cos(tRad)
    );
    orbitCamera.lookAt(orbitMouse.tx,orbitMouse.ty,0);
    orbitRenderer.render(orbitScene,orbitCamera);
  }
  animate();
}

function updateOrbitStats(a){
  const alt=getAlt(a);
  document.getElementById('orbit-stats').innerHTML=
    `<div style="color:#555">${alt!=null?alt.toLocaleString()+' ft':''}</div>`+
    `<div style="color:#444">${a.gs!=null?Math.round(a.gs)+' kts':''}</div>`+
    `<div style="color:#333">${a.track!=null?Math.round(a.track)+'° HDG':''}</div>`;
}

function closeOrbit(){
  document.getElementById('orbit-overlay').classList.remove('open');
  cancelAnimationFrame(orbitAnim);
  if(orbitRenderer){orbitRenderer.dispose();orbitRenderer=null;}
  orbitHex=null;
}

// ══════════════════════════════════════════════════════════════
// FETCH
// ══════════════════════════════════════════════════════════════
async function fetchAircraft(){
  const c=mlmap.getCenter();
  const lat=c.lat.toFixed(3),lon=c.lng.toFixed(3);
  const zoom=mlmap.getZoom();
  const nm=zoom<5?250:zoom<7?200:zoom<9?120:60;
  const eps=[
    [`https://api.airplanes.live/v2/point/${lat}/${lon}/${nm}`,'airplanes.live'],
    [`https://api.adsb.one/v2/point/${lat}/${lon}/${nm}`,'adsb.one'],
    [`https://opendata.adsb.fi/api/v3/lat/${lat}/lon/${lon}/dist/${nm}`,'adsb.fi'],
    [`https://api.adsb.lol/v2/point/${lat}/${lon}/${nm}`,'adsb.lol'],
    [`https://corsproxy.io/?url=${encodeURIComponent(`https://api.airplanes.live/v2/point/${lat}/${lon}/${nm}`)}`,'corsproxy'],
    [`https://api.allorigins.win/raw?url=${encodeURIComponent(`https://api.airplanes.live/v2/point/${lat}/${lon}/${nm}`)}`,'allorigins'],
  ];
  for(const[url,label]of eps){
    try{
      const r=await fetch(url,{mode:'cors',cache:'no-store',signal:AbortSignal.timeout(9000)});
      if(!r.ok)continue;
      const d=await r.json();
      const list=d.aircraft??d.ac??d.planes??d.data??[];
      if(!Array.isArray(list)||list.length===0)continue;
      aircraft=list.filter(a=>a.lat!=null&&a.lon!=null);
      updateTrails();render();
      // If orbit is open, refresh its stats
      if(orbitHex){const oa=aircraft.find(x=>x.hex===orbitHex);if(oa)updateOrbitStats(oa);}
      document.getElementById('sa').textContent=aircraft.filter(a=>!onGround(a)).length.toLocaleString();
      document.getElementById('sg').textContent=aircraft.filter(onGround).length.toLocaleString();
      document.getElementById('sm').textContent=aircraft.filter(isMil).length.toLocaleString();
      const alts=aircraft.map(getAlt).filter(Boolean);
      document.getElementById('st2').textContent=alts.length?Math.max(...alts).toLocaleString()+' ft':'—';
      document.getElementById('st').textContent=`${new Date().toLocaleTimeString()} · ${label}`;
      document.getElementById('ct').textContent=`${aircraft.length.toLocaleString()} aircraft`;
      return;
    }catch(e){}
  }
  document.getElementById('st').textContent='⚠ all APIs failed';
}

// ══════════════════════════════════════════════════════════════
// PANEL / SEARCH / CONTROLS
// ══════════════════════════════════════════════════════════════
function openPanel(hex,pan=true){
  const a=aircraft.find(x=>x.hex===hex);if(!a)return;
  selHex=hex;
  const cs=(a.flight??a.callsign??'').trim()||a.hex?.toUpperCase()||'—';
  const alt=onGround(a)?'On ground':getAlt(a)!=null?getAlt(a).toLocaleString()+' ft':'—';
  const fl=!onGround(a)&&getAlt(a)?` FL${Math.round(getAlt(a)/100).toString().padStart(3,'0')}`:'';
  const vr=a.baro_rate!=null?`${a.baro_rate>0?'▲':a.baro_rate<0?'▼':'→'} ${Math.abs(a.baro_rate).toLocaleString()} fpm`:null;
  document.getElementById('pc').textContent=cs;
  document.getElementById('pc').style.color=rgbC(getAlt(a));
  document.getElementById('pt').textContent=[a.desc,a.t,a.r].filter(Boolean).join(' · ')||'Unknown';
  const rows=[
    ['ICAO',a.hex?.toUpperCase(),''],['Callsign',(a.flight??a.callsign??'').trim()||null,''],
    ['Reg.',a.r,''],['Type',a.t,''],['Aircraft',a.desc,''],['Operator',a.ownOp??a.operator,''],
    ['Altitude',alt+fl,'hi'],['Speed',a.gs!=null?Math.round(a.gs)+' kts':null,''],
    ['Mach',a.mach!=null?a.mach.toFixed(2):null,''],['Heading',a.track!=null?Math.round(a.track)+'°':null,''],
    ['Vert.Rate',vr,a.baro_rate<-100?'w':''],
    ['Squawk',a.squawk,['7500','7600','7700'].includes(a.squawk)?'e':''],
    ['Emergency',a.emergency&&a.emergency!=='none'?'⚠ '+a.emergency.toUpperCase():null,'e'],
    ['Military',isMil(a)?'⚠ YES':null,'w'],
    ['Position',a.lat!=null?`${a.lat.toFixed(4)}°, ${a.lon.toFixed(4)}°`:null,''],
  ].filter(([,v])=>v!=null&&v!=='');
  document.getElementById('pb').innerHTML=rows.map(([l,v,c])=>
    `<div class="row"><span class="rl">${l}</span><span class="rv ${c}">${v}</span></div>`).join('');
  document.getElementById('fa').href=cs!==a.hex?.toUpperCase()
    ?`https://flightaware.com/live/flight/${cs}`:`https://flightaware.com/live/modes/${a.hex}/redirect`;
  document.getElementById('panel').classList.add('open');
  if(pan&&a.lat&&a.lon)mlmap.flyTo({center:[a.lon,a.lat],duration:600});
  render();
}
document.getElementById('xb').onclick=()=>{selHex=null;document.getElementById('panel').classList.remove('open');render();};

function doSearch(){
  const q=document.getElementById('sq').value.trim().toLowerCase();if(!q)return;
  const f=aircraft.find(a=>a.flight?.trim().toLowerCase()===q||a.callsign?.trim().toLowerCase()===q||a.hex?.toLowerCase()===q||a.r?.toLowerCase()===q);
  if(f){mlmap.flyTo({center:[f.lon,f.lat],zoom:9,duration:800});openPanel(f.hex,false);}
  else document.getElementById('st').textContent=`"${q}" not found`;
}
document.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('[data-f]').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');filt=b.dataset.f;render();
});

function startBar(){
  const p=document.getElementById('prg');
  p.style.transition='none';p.style.width='0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{p.style.transition=`width ${REFRESH}ms linear`;p.style.width='100%';}));
}
mlmap.on('moveend',()=>{
  if(!ready)return;
  clearInterval(timer);fetchAircraft();startBar();
  timer=setInterval(()=>{fetchAircraft();startBar();},REFRESH);
});
</script>
